<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">ChurchCore Ops core workflow map</title>
  <desc id="desc">Workflow map for account onboarding, member actions, church admin operations, finance, readiness, and ShepherdAI suggestions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475467"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.flow{fill:#e0f2fe;stroke:#0284c7}.admin{fill:#ecfdf3;stroke:#16a34a}.ai{fill:#f5f3ff;stroke:#7c3aed}.finance{fill:#fff7ed;stroke:#ea580c}.title{font:700 28px Arial,sans-serif;fill:#101828}.label{font:700 14px Arial,sans-serif;fill:#101828}.small{font:13px Arial,sans-serif;fill:#344054}.line{stroke:#475467;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1120" height="620" rx="18"/>
  <text x="48" y="58" class="title">Core Workflow Map</text>
  <text x="48" y="86" class="small">The main evaluator story: request access, hydrate a church-scoped profile, operate the church, and promote deterministic workflow suggestions.</text>

  <rect x="54" y="132" width="180" height="64" rx="11" class="flow"/><text x="76" y="162" class="label">Public portal request</text><text x="76" y="182" class="small">Visitor or member</text>
  <rect x="286" y="132" width="180" height="64" rx="11" class="flow"/><text x="308" y="162" class="label">Admin review</text><text x="308" y="182" class="small">Approve or reject</text>
  <rect x="518" y="132" width="180" height="64" rx="11" class="flow"/><text x="540" y="162" class="label">Tenant invitation</text><text x="540" y="182" class="small">Auth and membership</text>
  <rect x="750" y="132" width="180" height="64" rx="11" class="flow"/><text x="772" y="162" class="label">Profile hydration</text><text x="772" y="182" class="small">Church-scoped context</text>

  <path d="M234 164 H286" class="line"/><path d="M466 164 H518" class="line"/><path d="M698 164 H750" class="line"/>

  <rect x="126" y="282" width="180" height="64" rx="11" class="admin"/><text x="148" y="312" class="label">People and households</text>
  <rect x="350" y="282" width="180" height="64" rx="11" class="admin"/><text x="372" y="312" class="label">Ministry Forge</text>
  <rect x="574" y="282" width="180" height="64" rx="11" class="admin"/><text x="596" y="312" class="label">Events and volunteers</text>
  <rect x="798" y="282" width="180" height="64" rx="11" class="finance"/><text x="820" y="312" class="label">Giving and finance</text>

  <rect x="126" y="426" width="180" height="64" rx="11" class="ai"/><text x="148" y="456" class="label">Scheduled signals</text>
  <rect x="350" y="426" width="180" height="64" rx="11" class="ai"/><text x="372" y="456" class="label">Suggested workflows</text>
  <rect x="574" y="426" width="180" height="64" rx="11" class="ai"/><text x="596" y="456" class="label">Workflow queue</text>
  <rect x="798" y="426" width="180" height="64" rx="11" class="ai"/><text x="820" y="456" class="label">Assign or complete</text>

  <path d="M840 196 C840 244 216 238 216 282" class="line"/>
  <path d="M306 314 H350" class="line"/><path d="M530 314 H574" class="line"/><path d="M754 314 H798" class="line"/>
  <path d="M216 346 V426" class="line"/>
  <path d="M306 458 H350" class="line"/><path d="M530 458 H574" class="line"/><path d="M754 458 H798" class="line"/>

  <rect x="54" y="534" width="978" height="42" rx="10" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="76" y="560" class="small">Validation path: npm run setup:local -> npm run dev -> npm run smoke:preview -> npm run smoke:local -> npm run lint -> npm run build.</text>
</svg>
