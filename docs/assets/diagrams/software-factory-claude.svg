<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code software factory for ChurchCore</title>
  <desc id="desc">Diagram showing Claude Code using project rules, skills, agents, hooks, human approval gates, implementation agents, tests, validation, and delivery.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font:700 30px system-ui,-apple-system,Segoe UI,sans-serif;fill:#111827}.sub{font:500 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475467}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:12}.agent{fill:#eef2ff;stroke:#4f46e5}.skill{fill:#ecfdf3;stroke:#16a34a}.human{fill:#fff7ed;stroke:#ea580c}.guard{fill:#fef2f2;stroke:#dc2626}.delivery{fill:#eff6ff;stroke:#0284c7}.label{font:700 16px system-ui,-apple-system,Segoe UI,sans-serif;fill:#111827}.small{font:500 13px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475467}.tiny{font:500 12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#667085}.arrow{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dashed{stroke-dasharray:7 6}.lane{fill:#ffffff;stroke:#e2e8f0;stroke-width:2;rx:16}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="48" y="52">Claude Code Software Factory</text>
  <text class="sub" x="48" y="80">Claude uses repo facts, skills, focused agents, approval gates, and hooks to move from idea to reviewed PR.</text>

  <rect class="lane" x="40" y="112" width="1200" height="120"/>
  <text class="label" x="64" y="144">Persistent Context</text>
  <rect class="box" x="64" y="164" width="170" height="44"/><text class="small" x="84" y="191">CLAUDE.md</text>
  <rect class="box" x="260" y="164" width="170" height="44"/><text class="small" x="282" y="191">AGENTS.md</text>
  <rect class="box" x="456" y="164" width="210" height="44"/><text class="small" x="477" y="191">DEVELOPMENT_PLAN.md</text>
  <rect class="box" x="692" y="164" width="150" height="44"/><text class="small" x="727" y="191">docs/adr</text>
  <rect class="box" x="868" y="164" width="160" height="44"/><text class="small" x="897" y="191">module docs</text>
  <rect class="guard" x="1054" y="164" width="150" height="44"/><text class="small" x="1080" y="191">pre-commit hook</text>

  <rect class="lane" x="40" y="260" width="1200" height="278"/>
  <text class="label" x="64" y="292">Factory Chain</text>
  <rect class="skill" x="64" y="322" width="180" height="72"/><text class="label" x="88" y="350">feature-factory</text><text class="tiny" x="88" y="373">orchestrates chain</text>
  <rect class="agent" x="286" y="322" width="150" height="72"/><text class="small" x="314" y="350">researcher</text><text class="tiny" x="308" y="373">read-only map</text>
  <rect class="agent" x="470" y="322" width="150" height="72"/><text class="small" x="500" y="350">story writer</text><text class="tiny" x="491" y="373">criteria</text>
  <rect class="human" x="654" y="322" width="150" height="72"/><text class="small" x="688" y="350">human gate</text><text class="tiny" x="683" y="373">story approval</text>
  <rect class="agent" x="838" y="322" width="150" height="72"/><text class="small" x="876" y="350">spec writer</text><text class="tiny" x="868" y="373">technical brief</text>
  <rect class="human" x="1022" y="322" width="150" height="72"/><text class="small" x="1056" y="350">human gate</text><text class="tiny" x="1054" y="373">brief approval</text>

  <rect class="agent" x="286" y="430" width="150" height="72"/><text class="small" x="314" y="458">backend</text><text class="tiny" x="310" y="481">server/data</text>
  <rect class="agent" x="470" y="430" width="150" height="72"/><text class="small" x="498" y="458">frontend</text><text class="tiny" x="492" y="481">routes/mobile</text>
  <rect class="agent" x="654" y="430" width="150" height="72"/><text class="small" x="694" y="458">tests</text><text class="tiny" x="684" y="481">acceptance</text>
  <rect class="agent" x="838" y="430" width="150" height="72"/><text class="small" x="878" y="458">validator</text><text class="tiny" x="868" y="481">strict review</text>
  <rect class="delivery" x="1022" y="430" width="150" height="72"/><text class="small" x="1058" y="458">PR review</text><text class="tiny" x="1050" y="481">delivery gate</text>

  <path class="arrow" d="M244 358H286"/><path class="arrow" d="M436 358H470"/><path class="arrow" d="M620 358H654"/><path class="arrow" d="M804 358H838"/><path class="arrow" d="M988 358H1022"/>
  <path class="arrow" d="M1097 394V416 Q1097 430 1082 430H436"/><path class="arrow" d="M436 466H470"/><path class="arrow" d="M620 466H654"/><path class="arrow" d="M804 466H838"/><path class="arrow" d="M988 466H1022"/>
  <path class="arrow dashed" d="M913 430V408 Q913 398 900 398H365 Q352 398 352 430"/>

  <rect class="lane" x="40" y="566" width="1200" height="126"/>
  <text class="label" x="64" y="598">Verification And Delivery</text>
  <rect class="skill" x="64" y="622" width="205" height="44"/><text class="small" x="86" y="649">build-with-tests skill</text>
  <rect class="box" x="305" y="622" width="150" height="44"/><text class="small" x="340" y="649">targeted tests</text>
  <rect class="box" x="491" y="622" width="130" height="44"/><text class="small" x="522" y="649">lint</text>
  <rect class="box" x="657" y="622" width="130" height="44"/><text class="small" x="687" y="649">build</text>
  <rect class="human" x="823" y="622" width="160" height="44"/><text class="small" x="857" y="649">human review</text>
  <rect class="delivery" x="1019" y="622" width="160" height="44"/><text class="small" x="1054" y="649">commit / PR</text>
  <path class="arrow" d="M269 644H305"/><path class="arrow" d="M455 644H491"/><path class="arrow" d="M621 644H657"/><path class="arrow" d="M787 644H823"/><path class="arrow" d="M983 644H1019"/>
</svg>
