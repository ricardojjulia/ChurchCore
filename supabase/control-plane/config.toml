# Control Plane Supabase project configuration.
# This is the SEPARATE project for ChurchCore Ops platform concerns:
# tenant registry, billing metadata, provisioning state, platform staff access,
# support operations, and tenant-view audit trails.
#
# This project is distinct from the tenant runtime project (supabase/config.toml).
# Do NOT add church operational tables (churches, profiles, ministries, events, etc.)
# to this project. Those belong in the tenant runtime project.
#
# Local development: run from this directory with:
#   supabase start --workdir supabase/control-plane
#
# Env vars activated by this project:
#   CONTROL_PLANE_SUPABASE_URL
#   CONTROL_PLANE_SUPABASE_PUBLISHABLE_KEY
#   CONTROL_PLANE_SUPABASE_SERVICE_ROLE_KEY
#   CONTROL_PLANE_DB_URL

# A string used to distinguish different Supabase projects on the same host.
project_id = "ChurchCoreOpsControlPlane"

[api]
enabled = true
# Use a different port from the tenant project (54321) to allow both to run locally.
port = 54331
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
# Use ports that do not conflict with the tenant project (54322 / 54320).
port = 54332
shadow_port = 54330
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
port = 54339
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[auth]
enabled = true
# Control-plane staff authenticate here, not through the tenant auth project.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/control"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = true

[studio]
enabled = true
port = 54333

[inbucket]
enabled = false

[storage]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
